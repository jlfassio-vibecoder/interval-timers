# App: lint, type-check, tests, security scan, env check
# Runs on push/PR to main/master.
name: CI (App)

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/app/**'
      - 'packages/exercise-mapping/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/app/**'
      - 'packages/exercise-mapping/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  verify-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0' # Pin to match app; avoids npm resolution drift

      - name: Install dependencies
        run: npm ci

      - name: Build exercise-mapping
        run: npm run build -w @interval-timers/exercise-mapping

      - name: Lint
        run: npm run lint -w app

      - name: Type check
        run: npm run type-check -w app

      - name: Test
        run: npm run test -w app

      - name: Security scan
        run: npm run security:scan -w app

      - name: Check env
        run: npm run check-env -w app
        env:
          CI: 'true'
